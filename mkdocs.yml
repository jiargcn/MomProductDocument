# 插件
plugins:
  - search:
      lang: zh
  - mermaid2
  - offline

# Markdown 扩展
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.tabbed
  - pymdownx.tasklist
  - tables
  - toc:
      permalink: true
  - fenced_code

# 扩展资源
