  - admonition
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.tabbed
  - pymdownx.tasklist
  - tables
  - toc:
      permalink: true
  - fenced_code

# 扩展资源
extra_css:
  - stylesheets/extra.css
extra_javascript:
  - javascripts/extra.js

